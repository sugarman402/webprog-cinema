<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Ticket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231256eb'/%3E%3Cpath d='M9 8h14v16H9z' fill='%23fff'/%3E%3Cpath d='M12 10h8v2h-8zm0 4h8v2h-8zm0 4h8v2h-8z' fill='%231256eb'/%3E%3C/svg%3E">
</head>
<body>
    <div id="app" class="container">
        <div id="authPage" class="auth-container">
            <div class="auth-box">
                <h1>Cinema Manager</h1>
                <p class="tagline">Browse fresh premieres, pick your showtime, and reserve seats in seconds.</p>

                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('register')">Register</button>
                </div>

                <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password:</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Full name:</label>
                        <input type="text" id="registerName" required>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">Email:</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Password:</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="registerIsAdmin" style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:0.9rem;">
                            <input type="checkbox" id="registerIsAdmin" style="width:auto;">
                            Register as admin
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>

                <div id="authMessage" class="alert"></div>
            </div>
        </div>

        <div id="mainPage" class="main-container" style="display: none;">
            <header class="navbar">
                <div class="navbar-content">
                    <h1 class="logo">Cinema Ticket</h1>
                    <div class="navbar-tabs">
                        <button class="navbar-tab active" onclick="switchMainTab('movies')">Movies</button>
                        <button class="navbar-tab" onclick="switchMainTab('screenings')">Screenings</button>
                        <button class="navbar-tab" onclick="switchMainTab('reservations')">Reservations</button>
                    </div>
                    <div class="user-info">
                        <span id="userName"></span>
                        <button class="btn btn-secondary" onclick="handleLogout()">Logout</button>
                    </div>
                </div>
            </header>

            <main class="content">
                <div id="moviesTab" class="main-tab active">
                    <section class="movies-section">
                        <div class="section-header">
                            <div>
                                <h2>Available movies</h2>
                                <p>Choose a movie and browse its screening times.</p>
                            </div>
                        </div>
                        <div id="moviesList" class="movies-grid">
                        </div>
                    </section>

                    <section class="admin-section">
                        <div class="section-header">
                            <h2>Add new movie</h2>
                        </div>
                        <form id="createMovieForm" class="admin-form" onsubmit="handleCreateMovie(event)">
                            <div class="form-group">
                                <label for="movieTitle">Title</label>
                                <input type="text" id="movieTitle" required>
                            </div>
                            <div class="form-group">
                                <label for="movieDescription">Description</label>
                                <textarea id="movieDescription" rows="3" required></textarea>
                            </div>
                            <div class="form-group">
                                <label for="movieDuration">Duration (minutes)</label>
                                <input type="number" id="movieDuration" min="1" required>
                            </div>
                            <div class="form-group">
                                <label for="movieGenre">Genre</label>
                                <input type="text" id="movieGenre" required>
                            </div>
                            <div class="form-group">
                                <label for="moviePosterUrl">Poster URL</label>
                                <input type="url" id="moviePosterUrl" placeholder="https://...">
                            </div>
                            <div id="movieFormMessage" class="alert"></div>
                            <button type="submit" class="btn btn-secondary">Add movie</button>
                        </form>
                    </section>
                </div>

                <div id="screeningsTab" class="main-tab">
                    <section class="screening-section">
                        <div class="section-header">
                            <h2>Screenings</h2>
                        </div>
                        <div id="screeningsList" class="screenings-list">
                        </div>
                    </section>

                    <section class="admin-section">
                        <div class="section-header">
                            <h2>Add new screening</h2>
                        </div>
                        <form id="createScreeningForm" class="admin-form" onsubmit="handleCreateScreening(event)">
                            <div class="form-group">
                                <label for="screeningMovieSelect">Movie</label>
                                <select id="screeningMovieSelect" required></select>
                            </div>
                            <div class="form-group">
                                <label for="screeningStartsAt">Start time</label>
                                <input type="datetime-local" id="screeningStartsAt" required>
                            </div>
                            <div class="form-group">
                                <label for="screeningSeats">Available seats</label>
                                <input type="number" id="screeningSeats" min="1" value="50" required>
                            </div>
                            <div class="form-group">
                                <label for="screeningPrice">Ticket price</label>
                                <input type="number" id="screeningPrice" min="0" step="100" value="2500" required>
                            </div>
                            <div id="screeningFormMessage" class="alert"></div>
                            <button type="submit" class="btn btn-secondary">Add screening</button>
                        </form>
                    </section>
                </div>

                <!-- Reservations Tab -->
                <div id="reservationsTab" class="main-tab">
                    <section class="reservations-section">
                        <div class="section-header">
                            <h2>Reservations</h2>
                            <button class="btn btn-success" onclick="showNewReservationSection()">+ New reservation</button>
                        </div>
                        <div id="newReservationSection" class="new-reservation-section" style="display: none;">
                            <h3>New reservation</h3>
                            <div id="newReservationMoviesList" class="movies-grid">
                            </div>
                        </div>
                        <div id="reservationsList" class="reservations-list">
                        </div>
                    </section>
                </div>
            </main>
        </div>

        <div id="bookingModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeBookingModal()">&times;</span>
                <h2 id="bookingModalTitle">Book tickets</h2>
                <form onsubmit="handleCreateReservation(event)">
                    <div class="form-group">
                        <label for="screeningSelect">Screening</label>
                        <select id="screeningSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label for="seatCount">Number of seats</label>
                        <input type="number" id="seatCount" min="1" value="1" required>
                    </div>
                    <div id="bookingError" class="alert"></div>
                    <button type="submit" class="btn btn-primary">Book</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
